name: Tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  run-lint:
    name: Black check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install uv
        # astral-sh/setup-uv is not in the org allowed actions list
        run: curl -LsSf https://astral.sh/uv/install.sh | sh

      - name: Install Python
        run: uv python install

      - name: Install python dependencies
        run: uv sync

      - name: Check formatting
        run: uv run black --check --diff .

  run-tests:
    name: Ape tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install uv
        # astral-sh/setup-uv is not in the org allowed actions list
        run: curl -LsSf https://astral.sh/uv/install.sh | sh

      - name: Install Python
        run: uv python install

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@c7450ba673e133f5ee30098b3b54f444d3a2ca2d # v1.8.0

      - name: Load cached uv downloads
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.cache/uv
          key: uv-${{ runner.os }}-${{ hashFiles('uv.lock') }}

      - name: Install python dependencies
        run: uv sync

      - name: Check RPC_URL is configured
        run: test -n "$RPC_URL" || { echo "::error::RPC_URL secret is empty or missing"; exit 1; }
        env:
          RPC_URL: ${{ secrets.RPC_URL }}

      - name: Run tests
        run: >
          uv run ape test -s --network :mainnet-fork:foundry
        env:
          RPC_URL: ${{ secrets.RPC_URL }}
          NETWORK: mainnet
